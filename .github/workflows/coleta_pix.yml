name: Atualizar dashboard PIX Doutores

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: atualizar-dashboard-pix-doutores
  cancel-in-progress: false

jobs:
  atualizar-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sincronizar branch local com origin/main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          git clean -fd

      - name: Validar secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "ERRO: secret SUPABASE_URL não configurado"
            exit 1
          fi

          if [ -z "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" ]; then
            echo "ERRO: secret SUPABASE_SERVICE_ROLE_KEY não configurado"
            exit 1
          fi

          if [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "ERRO: secret SUPABASE_ANON_KEY não configurado"
            exit 1
          fi

      - name: Executar coleta dos dados
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          python coletor_pix.py

      - name: Gerar dashboard_data e dashboard.html
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          python generate_data.py
          python generate_dashboard.py

      - name: Verificar alterações
        id: changes
        run: |
          git status --short
          if git diff --quiet && git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commitar alterações
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git add .
          git commit -m "Atualiza dashboard PIX Doutores"

      - name: Enviar alterações para o GitHub
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git push origin main

      - name: Sem alterações
        if: steps.changes.outputs.has_changes != 'true'
        run: |
          echo "Nenhuma alteração encontrada. Nada para enviar."
