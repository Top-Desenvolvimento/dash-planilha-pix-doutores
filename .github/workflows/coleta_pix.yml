name: Coleta PIX Doutores

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  coletar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          pip install playwright
          playwright install chromium

      - name: Rodar coletor
        env:
          TOP_USER: ${{ secrets.TOP_USER }}
          TOP_PASS: ${{ secrets.TOP_PASS }}
        run: |
          python bot/coletor_pix.py

      - name: Mostrar arquivo gerado
        run: |
          echo "---- LISTANDO DATA ----"
          ls -la data
          echo "---- CONTEUDO PIX_DOUTORES ----"
          cat data/pix_doutores.json

      - name: Commit dos dados atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/pix_doutores.json
          git diff --cached --quiet || git commit -m "Atualiza pix_doutores.json"
          git push

      - name: Upload arquivos de debug
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-coletor
          path: |
            debug_*.html
            debug_*.png
