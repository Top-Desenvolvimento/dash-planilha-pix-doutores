<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redefinir senha</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-screen">
    <div class="auth-card">
      <h1>Redefinir senha</h1>
      <p class="auth-subtitle">Digite sua nova senha</p>

      <form id="resetForm" class="auth-form">
        <label for="newPassword">Nova senha</label>
        <input id="newPassword" type="password" required />

        <label for="confirmPassword">Confirmar senha</label>
        <input id="confirmPassword" type="password" required />

        <button type="submit" class="btn btn-primary">Salvar nova senha</button>
      </form>

      <div id="resetMessage" class="auth-message"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script>
    function setMessage(text, isError = false) {
      const el = document.getElementById("resetMessage");
      el.textContent = text;
      el.className = isError ? "auth-message error" : "auth-message";
    }

    document.getElementById("resetForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const newPassword = document.getElementById("newPassword").value.trim();
      const confirmPassword = document.getElementById("confirmPassword").value.trim();

      if (!newPassword || !confirmPassword) {
        setMessage("Preencha os dois campos.", true);
        return;
      }

      if (newPassword !== confirmPassword) {
        setMessage("As senhas não conferem.", true);
        return;
      }

      try {
        const { error } = await supabaseClient.auth.updateUser({
          password: newPassword
        });

        if (error) throw error;

        setMessage("Senha alterada com sucesso. Você já pode voltar e entrar.");
      } catch (err) {
        console.error(err);
        setMessage("Não foi possível alterar a senha.", true);
      }
    });
  </script>
</body>
</html>
