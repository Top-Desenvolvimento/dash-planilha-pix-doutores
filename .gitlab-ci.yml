image: python:3.11

stages:
  - build
  - deploy

before_script:
  - python --version
  - pip install --upgrade pip
  - pip install playwright pandas openpyxl
  - python -m playwright install chromium

build_dashboard:
  stage: build
  script:
    - python bot/coletor_pix.py
    - python generate_data.py
    - echo "---- LISTANDO DATA ----"
    - ls -la data || true
    - echo "---- CONTEUDO PIX_DOUTORES ----"
    - cat data/pix_doutores.json || true
    - echo "---- CONTEUDO DASHBOARD_DATA ----"
    - cat data/dashboard_data.json || true
    - mkdir -p public
    - cp index.html public/
    - cp -r css public/ || true
    - cp -r js public/ || true
    - cp -r data public/ || true
  artifacts:
    paths:
      - public
      - debug_*.html
      - debug_*.png

pages:
  stage: deploy
  script:
    - echo "Publicando dashboard"
  artifacts:
    paths:
      - public
  only:
    - main
      - public
  only:
    - main
