image: python:3.11

stages:
  - build
  - deploy

before_script:
  - pip install playwright
  - python -m playwright install chromium

build:
  stage: build
  script:
    - python bot/coletor_pix.py
    - python generate_data.py
    - mkdir -p public
    - cp -r data public/
    - cp index.html public/
    - cp -r css public/ || true
    - cp -r js public/ || true
  artifacts:
    paths:
      - public

pages:
  stage: deploy
  script:
    - echo deploy
  artifacts:
    paths:
      - public
  only:
    - main
