image: python:3.11

stages:
  - build
  - deploy

before_script:
  - python --version
  - pip install --upgrade pip
  - pip install pandas openpyxl playwright
  - python -m playwright install chromium

build_dashboard:
  stage: build
  script:
    - python scripts/coletor_pix.py
    - python generate_data.py
    - mkdir -p public
    - cp index.html public/
    - cp -r css public/ || true
    - cp -r js public/ || true
    - cp -r data public/ || true
  artifacts:
    paths:
      - public

pages:
  stage: deploy
  script:
    - echo "Publicando dashboard"
  artifacts:
    paths:
      - public
  only:
    - main
      - public
  only:
    - main
