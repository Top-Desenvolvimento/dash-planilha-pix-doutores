<div id="authScreen" class="auth-screen">
  <div class="auth-card">
    <h1>Entrar</h1>
    <p class="auth-subtitle">Acesso restrito à dashboard.</p>

    <form id="loginForm" class="auth-form">
      <label for="email">E-mail</label>
      <input id="email" type="email" placeholder="Digite seu e-mail" required />

      <label for="password">Senha</label>
      <input id="password" type="password" placeholder="Digite sua senha" required />

      <div class="auth-actions">
        <button type="submit" class="btn btn-primary">Entrar</button>
        <button type="button" id="btnCriarAcesso" class="btn btn-secondary">Criar acesso</button>
      </div>
    </form>

    <button id="btnForgotPassword" class="link-button" type="button">
      Esqueci minha senha
    </button>

    <div id="authMessage" class="auth-message"></div>
  </div>
</div>
